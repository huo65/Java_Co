<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MQTT系统运行监控面板 - 实时设备状态监控与管理">
    <title>系统运行监控 | MQTT Monitor</title>
    
    <!-- 预连接优化 -->
    <link rel="preconnect" href="https://unpkg.com">
    
    <!-- 样式表 -->
    <link rel="stylesheet" href="style.css">
    
    <!-- MQTT 库 -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
        // MQTT 库加载检查与回退
        if (typeof mqtt === 'undefined') {
            console.warn('主CDN加载失败，尝试备用CDN');
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.min.js';
            script.onload = function() {
                console.log('备用CDN加载成功');
            };
            script.onerror = function() {
                console.error('MQTT库加载失败');
                document.addEventListener('DOMContentLoaded', function() {
                    const errorEl = document.getElementById('error');
                    if (errorEl) {
                        errorEl.innerHTML = 'MQTT库加载失败，请检查网络连接';
                        errorEl.classList.remove('hidden');
                    }
                });
            };
            document.head.appendChild(script);
        }
    </script>
</head>
<body>
    <main class="container">
        <!-- 页面头部 -->
        <header role="banner">
            <h1>系统运行监控</h1>
            <div class="controls">
                <button id="refreshBtn" class="btn btn-primary" type="button">
                    <span aria-hidden="true">↻</span> 刷新设备列表
                </button>
                <span class="status-indicator" id="statusIndicator" role="status" aria-live="polite">
                    系统正常
                </span>
                <time class="last-update" id="lastUpdate" datetime="">上次更新: -</time>
            </div>
        </header>

        <!-- 统计摘要 -->
        <section class="stats-summary" aria-label="设备统计">
            <article class="stat-item" data-stat="total" tabindex="0" role="button" aria-label="查看所有设备">
                <div class="stat-number" id="totalClients" aria-live="polite">0</div>
                <div class="stat-label">总设备数</div>
            </article>
            <article class="stat-item" data-stat="online" tabindex="0" role="button" aria-label="筛选在线设备">
                <div class="stat-number" id="onlineClients" aria-live="polite">0</div>
                <div class="stat-label">在线设备</div>
            </article>
            <article class="stat-item" data-stat="offline" tabindex="0" role="button" aria-label="筛选离线设备">
                <div class="stat-number" id="offlineClients" aria-live="polite">0</div>
                <div class="stat-label">离线设备</div>
            </article>
            <article class="stat-item" data-stat="messages" tabindex="0">
                <div class="stat-number" id="mqttMessageCount" aria-live="polite">0</div>
                <div class="stat-label">系统消息</div>
            </article>
        </section>

        <!-- 过滤器 -->
        <section class="filters" aria-label="设备筛选">
            <label for="searchInput" class="visually-hidden">搜索设备</label>
            <input 
                type="search" 
                id="searchInput" 
                placeholder="搜索设备ID..." 
                aria-label="搜索设备ID"
                autocomplete="off"
            >
            <label for="statusFilter" class="visually-hidden">状态筛选</label>
            <select id="statusFilter" aria-label="按状态筛选">
                <option value="">全部状态</option>
                <option value="true">在线</option>
                <option value="false">离线</option>
            </select>
        </section>

        <!-- 设备列表 -->
        <section class="client-list" id="clientList" aria-label="设备列表">
            <div class="no-data">正在加载设备列表...</div>
        </section>
        
        <!-- 监控控制中心 -->
        <section class="monitoring-control-center" aria-label="MQTT监控控制">
            <!-- 连接状态卡片 -->
            <div class="connection-status-card">
                <div class="status-info">
                    <span class="status-label">监控节点连接状态</span>
                    <span id="mqttStatus" class="status-badge status-disconnected" role="status" aria-live="polite">
                        未连接
                    </span>
                </div>
                <div class="connection-actions">
                    <button id="connectBtn" class="btn btn-primary" type="button">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                        连接系统
                    </button>
                    <button id="disconnectBtn" class="btn btn-danger" type="button" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                        断开连接
                    </button>
                </div>
            </div>

            <!-- 主配置区域 -->
            <div class="config-main-grid">
                <!-- 连接配置面板 -->
                <div class="config-panel connection-panel">
                    <div class="panel-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                            <line x1="8" y1="21" x2="16" y2="21"/>
                            <line x1="12" y1="17" x2="12" y2="21"/>
                        </svg>
                        连接配置
                    </div>
                    
                    <div class="form-grid">
                        <div class="form-field">
                            <label for="mqttBrokerUrl">
                                <span class="field-label">服务器地址</span>
                                <span class="field-required">*</span>
                            </label>
                            <input 
                                type="url" 
                                id="mqttBrokerUrl" 
                                value="ws://localhost:8083/mqtt"
                                placeholder="ws://host:port/mqtt"
                                required
                            >
                        </div>
                        
                        <div class="form-field">
                            <label for="mqttClientId">
                                <span class="field-label">监控节点ID</span>
                            </label>
                            <input 
                                type="text" 
                                id="mqttClientId" 
                                value=""
                                placeholder="自动生成"
                            >
                        </div>
                        
                        <div class="form-field">
                            <label for="mqttUsername">
                                <span class="field-label">用户名</span>
                            </label>
                            <input 
                                type="text" 
                                id="mqttUsername" 
                                value="mica"
                                autocomplete="username"
                            >
                        </div>
                        
                        <div class="form-field">
                            <label for="mqttPassword">
                                <span class="field-label">密码</span>
                            </label>
                            <input 
                                type="password" 
                                id="mqttPassword" 
                                value="mica"
                                autocomplete="current-password"
                            >
                        </div>
                    </div>

                    <!-- 高级配置折叠面板 -->
                    <div class="advanced-config-wrapper">
                        <button id="toggleAdvancedConfig" class="btn btn-text" type="button" aria-expanded="false" aria-controls="advancedConfig">
                            <svg class="chevron-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                            高级配置
                        </button>
                        
                        <div id="advancedConfig" class="advanced-config-content hidden" aria-hidden="true">
                            <div class="form-grid compact">
                                <div class="form-field">
                                    <label for="keepalive">心跳间隔 (秒)</label>
                                    <input type="number" id="keepalive" value="60" min="10" max="300">
                                </div>
                                <div class="form-field">
                                    <label for="protocolId">通信协议</label>
                                    <select id="protocolId">
                                        <option value="MQTT">MQTT</option>
                                        <option value="MQIsdp">MQIsdp</option>
                                    </select>
                                </div>
                                <div class="form-field">
                                    <label for="protocolVersionSelect">协议版本</label>
                                    <select id="protocolVersionSelect">
                                        <option value="4">3.1.1</option>
                                        <option value="3">3.1</option>
                                        <option value="5">5.0</option>
                                    </select>
                                </div>
                                <div class="form-field">
                                    <label for="cleanSession">清理会话</label>
                                    <select id="cleanSession">
                                        <option value="true">是</option>
                                        <option value="false">否</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 消息操作面板 -->
                <div class="config-panel messaging-panel">
                    <div class="panel-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        消息操作
                    </div>
                    
                    <!-- 订阅区域 -->
                    <div class="messaging-section">
                        <div class="section-header">
                            <span class="section-title">主题订阅</span>
                            <div class="section-actions">
                                <button id="subscribeBtn" class="btn btn-secondary btn-sm" type="button">
                                    订阅
                                </button>
                                <button id="unsubscribeBtn" class="btn btn-sm" type="button">
                                    取消
                                </button>
                            </div>
                        </div>
                        <div class="form-field">
                            <label for="subscribeTopic" class="visually-hidden">订阅主题</label>
                            <input 
                                type="text" 
                                id="subscribeTopic" 
                                value="/device/status"
                                placeholder="输入要订阅的主题，如: /device/status"
                            >
                        </div>
                    </div>
                    
                    <!-- 发布区域 -->
                    <div class="messaging-section">
                        <div class="section-header">
                            <span class="section-title">消息发布</span>
                            <button id="publishBtn" class="btn btn-success btn-sm" type="button">
                                发布
                            </button>
                        </div>
                        <div class="form-stack">
                            <div class="form-field">
                                <label for="publishTopic" class="visually-hidden">发布主题</label>
                                <input 
                                    type="text" 
                                    id="publishTopic" 
                                    value="test/status" 
                                    placeholder="发布主题"
                                >
                            </div>
                            <div class="form-field">
                                <label for="publishPayload" class="visually-hidden">消息内容</label>
                                <textarea 
                                    id="publishPayload" 
                                    rows="3"
                                    placeholder='消息内容 (JSON格式，如: {"status":"online"})'
                                >{"status":"online"}</textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 消息日志区域 -->
        <section class="unified-messages" aria-label="系统消息日志">
            <h3>系统监控消息</h3>
            <div class="smart-messages-container">
                <article class="message-panel device-message-panel">
                    <div class="panel-header">
                        <span>设备消息</span>
                        <span class="message-count" id="deviceMessageCount" aria-live="polite">0</span>
                    </div>
                    <div 
                        class="log-container" 
                        id="receivedMessages" 
                        role="log" 
                        aria-live="polite" 
                        aria-label="设备消息日志"
                        style="min-height: 300px;"
                    >
                        <div class="no-data">等待接收消息...</div>
                    </div>
                </article>
                
                <article class="message-panel connection-log-panel">
                    <div class="panel-header">
                        <span>连接日志</span>
                    </div>
                    <div 
                        class="log-container" 
                        id="connectionLog" 
                        role="log" 
                        aria-live="polite" 
                        aria-label="连接日志"
                        style="min-height: 120px;"
                    >
                    </div>
                </article>
            </div>
        </section>

        <!-- 状态提示 -->
        <div id="loading" class="loading hidden" role="status" aria-live="polite">
            <span aria-hidden="true">⏳</span> 加载中...
        </div>
        <div id="error" class="error hidden" role="alert" aria-live="assertive"></div>
    </main>

    <!-- 脚本 -->
    <script src="mqtt-js-script.js"></script>
    <script>
        // 设备卡片交互
        document.addEventListener('DOMContentLoaded', function() {
            const clientList = document.getElementById('clientList');
            
            // 设备卡片点击选择
            clientList.addEventListener('click', function(e) {
                const deviceCard = e.target.closest('.device-card');
                if (!deviceCard) {
                    // 点击空白处取消选择
                    document.querySelectorAll('.device-card.selected').forEach(card => {
                        card.classList.remove('selected');
                        card.setAttribute('aria-selected', 'false');
                    });
                    return;
                }
                
                // 切换选中状态
                const isSelected = deviceCard.classList.contains('selected');
                
                // 如果不是多选模式，清除其他选择
                if (!(e.ctrlKey || e.metaKey)) {
                    document.querySelectorAll('.device-card.selected').forEach(card => {
                        card.classList.remove('selected');
                        card.setAttribute('aria-selected', 'false');
                    });
                }
                
                if (!isSelected) {
                    deviceCard.classList.add('selected');
                    deviceCard.setAttribute('aria-selected', 'true');
                }
            });
            
            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.device-card.selected').forEach(card => {
                        card.classList.remove('selected');
                        card.setAttribute('aria-selected', 'false');
                    });
                }
            });
            
            // 统计卡片点击筛选
            document.querySelectorAll('.stat-item[data-stat]').forEach(stat => {
                stat.addEventListener('click', function() {
                    const statType = this.getAttribute('data-stat');
                    const statusFilter = document.getElementById('statusFilter');
                    
                    if (statType === 'online') {
                        statusFilter.value = 'true';
                    } else if (statType === 'offline') {
                        statusFilter.value = 'false';
                    } else {
                        statusFilter.value = '';
                    }
                    
                    // 触发筛选事件
                    statusFilter.dispatchEvent(new Event('change'));
                });
                
                // 键盘支持
                stat.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            });
        });
    </script>
</body>
</html>
